{% extends 'base.html' %}

{% block content %}
    <div class="p-3 mx-auto" style="max-width: 500px;">
        <h1 class="text-center">New Task</h1>
        <form method="POST" action="
                      {% if not task_id %}
                      {% url 'add_task' list_id %}
                      {% else %}
                      {% url 'edit_task' task_id %}
                      {% endif %}
                      ">
            {% csrf_token %}
            {{ form }}
        <br>
        <button class="btn btn-success" type="submit">Submit</button>
    </form>
    </div>
{% endblock %}
