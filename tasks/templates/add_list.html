{% extends 'base.html' %}

{% block content %}
    <div class="p-3 mx-auto" style="max-width: 500px;">
        <h1 class="text-center">New Task List</h1>
        <form method="POST" action="
                      {% if not list_id %}
                      {% url 'add_list' %}
                      {% else %}
                      {% url 'edit_list' list_id %}
                      {% endif %}
                      ">
            {% csrf_token %}
            {{form}}
            <br>
            <button type="submit" class="btn btn-success">Submit</button>
        </form>
        {% if list_id %}
            <a class="text-decoration-none btn btn-danger"
               href={% url 'delete_list' list_id %}>
                Delete
            </a>
        {% endif %}
    </div>
{% endblock %}
